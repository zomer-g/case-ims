<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-IMS: ניהול מערכת</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #2c5364; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: var(--brand) !important; }
        .stat-card { border: none; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--brand); }
        .stat-card .stat-label { font-size: 0.85rem; color: #6c757d; }
        :focus-visible { outline: 3px solid #f59e0b !important; outline-offset: 2px !important; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/static/index.html">
                <i class="fas fa-folder-open me-2"></i>Case-IMS
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html"><i class="fas fa-file-alt me-1"></i>חומרים</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/entities.html"><i class="fas fa-project-diagram me-1"></i>ישויות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/groups.html"><i class="fas fa-layer-group me-1"></i>קבוצות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/timeline.html"><i class="fas fa-stream me-1"></i>ציר זמן</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/admin.html"><i class="fas fa-cog me-1"></i>ניהול</a></li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item d-flex align-items-center me-3">
                        <i class="fas fa-briefcase text-light me-1"></i>
                        <select id="global-case-select" class="form-select form-select-sm" style="max-width:200px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);"></select>
                    </li>
                    <li class="nav-item"><span class="nav-link text-light" id="user-email"></span></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>יציאה</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h2 class="mb-4"><i class="fas fa-cog me-2"></i>ניהול מערכת</h2>

        <!-- Stats -->
        <div class="row g-3 mb-4" id="stats-row">
            <div class="col-6 col-md-3">
                <div class="card stat-card p-3 text-center">
                    <div class="stat-value" id="stat-users">-</div>
                    <div class="stat-label">משתמשים</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card p-3 text-center">
                    <div class="stat-value" id="stat-materials">-</div>
                    <div class="stat-label">חומרים</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card p-3 text-center">
                    <div class="stat-value" id="stat-cases">-</div>
                    <div class="stat-label">תיקים</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card p-3 text-center">
                    <div class="stat-value" id="stat-queue">-</div>
                    <div class="stat-label">בתור עיבוד</div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-prompts" role="tab">חוקי פרומפט</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-fields" role="tab">שדות שזוהו</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-users" role="tab">משתמשים</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-activity" role="tab">פעילות</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-settings" role="tab">הגדרות</a></li>
        </ul>

        <div class="tab-content">
            <!-- Prompts -->
            <div class="tab-pane fade show active" id="tab-prompts" role="tabpanel">
                <div class="d-flex justify-content-between mb-3">
                    <h5>חוקי פרומפט</h5>
                    <button class="btn btn-primary btn-sm" id="add-prompt-btn"><i class="fas fa-plus me-1"></i>חוק חדש</button>
                </div>
                <div id="prompts-list"></div>
            </div>

            <!-- Fields -->
            <div class="tab-pane fade" id="tab-fields" role="tabpanel">
                <h5 class="mb-3">שדות שזוהו</h5>
                <div id="fields-list"></div>
            </div>

            <!-- Users -->
            <div class="tab-pane fade" id="tab-users" role="tabpanel">
                <h5 class="mb-3">משתמשים</h5>
                <div id="users-list"></div>
            </div>

            <!-- Activity -->
            <div class="tab-pane fade" id="tab-activity" role="tabpanel">
                <h5 class="mb-3">יומן פעילות</h5>
                <div id="activity-list"></div>
            </div>

            <!-- Settings -->
            <div class="tab-pane fade" id="tab-settings" role="tabpanel">
                <h5 class="mb-3">הגדרות מערכת</h5>
                <div id="settings-list"></div>
            </div>
        </div>
    </main>

    <!-- Edit/Create Prompt Modal -->
    <div class="modal fade" id="editPromptModal" tabindex="-1" aria-labelledby="editPromptModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editPromptModalLabel">עריכת חוק</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="edit-prompt-name" class="form-label">שם החוק</label>
                        <input type="text" class="form-control" id="edit-prompt-name" placeholder="שם החוק">
                    </div>
                    <div class="mb-3">
                        <label for="edit-prompt-text" class="form-label">טקסט הפרומפט</label>
                        <textarea class="form-control" id="edit-prompt-text" rows="10" placeholder="הוראות הפרומפט..." style="direction:rtl; font-family:monospace; font-size:0.85rem;"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="edit-prompt-trigger-tag" class="form-label">Trigger Tag <small class="text-muted">(אופציונלי)</small></label>
                            <input type="text" class="form-control" id="edit-prompt-trigger-tag" placeholder="לדוגמה: סוג_מסמך">
                        </div>
                        <div class="col-md-4">
                            <label for="edit-prompt-trigger-value" class="form-label">Trigger Value <small class="text-muted">(אופציונלי)</small></label>
                            <input type="text" class="form-control" id="edit-prompt-trigger-value" placeholder="לדוגמה: חוזה">
                        </div>
                        <div class="col-md-2">
                            <label for="edit-prompt-max-tokens" class="form-label">Max Tokens</label>
                            <input type="number" class="form-control" id="edit-prompt-max-tokens" value="3000" min="100" max="10000">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="edit-prompt-active" checked>
                                <label class="form-check-label" for="edit-prompt-active">פעיל</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button type="button" class="btn btn-primary" id="save-edit-prompt-btn"><i class="fas fa-save me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/admin.js"></script>
</body>
</html>
