<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-IMS: ציר זמן</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #2c5364; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: var(--brand) !important; }
        .hero { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 2rem 0 1.5rem; }

        /* Vertical Timeline */
        .timeline { position: relative; padding: 1rem 0; }
        .timeline::before {
            content: ''; position: absolute; right: 30px; top: 0; bottom: 0;
            width: 3px; background: #dee2e6;
        }
        .timeline-item { position: relative; padding: 0.5rem 70px 1.5rem 0; }
        .timeline-dot {
            position: absolute; right: 21px; top: 0.7rem;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--brand); border: 3px solid #fff;
            box-shadow: 0 0 0 2px #dee2e6; z-index: 1;
        }
        .timeline-dot.ai { background: #0d6efd; }
        .timeline-dot.entity { background: #dc3545; }
        .timeline-card {
            background: white; border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1rem;
        }
        .timeline-date { font-weight: bold; color: var(--brand); font-size: 0.9rem; }
        .timeline-tag { font-size: 0.7rem; background: #e8f4f8; color: var(--brand); border-radius: 1rem; padding: 0.1rem 0.4rem; }
        .confidence-bar { height: 4px; border-radius: 2px; background: #dee2e6; }
        .confidence-fill { height: 100%; border-radius: 2px; background: #198754; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/static/index.html"><i class="fas fa-folder-open me-2"></i>Case-IMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html"><i class="fas fa-file-alt me-1"></i>חומרים</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/entities.html"><i class="fas fa-project-diagram me-1"></i>ישויות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/groups.html"><i class="fas fa-layer-group me-1"></i>קבוצות</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/timeline.html"><i class="fas fa-stream me-1"></i>ציר זמן</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/static/admin.html"><i class="fas fa-cog me-1"></i>ניהול</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-user-info"><span class="nav-link text-light" id="user-email"></span></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="/static/login.html"><i class="fas fa-sign-in-alt me-1"></i>כניסה</a></li>
                    <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>יציאה</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0"><i class="fas fa-stream me-2"></i>ציר זמן</h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-light" id="generate-btn"><i class="fas fa-robot me-1"></i>הפקה אוטומטית</button>
                    <button class="btn btn-sm btn-outline-light" id="new-event-btn"><i class="fas fa-plus me-1"></i>אירוע חדש</button>
                </div>
            </div>
            <div class="d-flex gap-2 flex-wrap align-items-center">
                <select class="form-select form-select-sm" id="case-filter" style="max-width:200px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                    <option value="">כל התיקים</option>
                </select>
                <input type="date" class="form-control form-control-sm" id="date-from" style="max-width:160px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <input type="date" class="form-control form-control-sm" id="date-to" style="max-width:160px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <select class="form-select form-select-sm" id="source-filter" style="max-width:120px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                    <option value="">כל המקורות</option>
                    <option value="manual">ידני</option>
                    <option value="ai">AI</option>
                    <option value="entity">ישות</option>
                </select>
                <span class="text-light small" id="total-count"></span>
            </div>
        </div>
    </section>

    <main class="container py-4">
        <div id="loading-spinner" class="text-center py-5 d-none"><div class="spinner-border text-secondary"></div></div>
        <div id="empty-state" class="text-center py-5 d-none">
            <i class="fas fa-stream fa-3x text-muted mb-3 d-block"></i>
            <p class="text-muted">אין אירועים בציר הזמן. צור אירוע או הפק אוטומטית מחומרים.</p>
        </div>
        <div class="timeline" id="timeline-container"></div>
    </main>

    <!-- Create Event Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="eventModalLabel">אירוע חדש</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="event-id">
                    <div class="mb-3"><label class="form-label">תיק</label><select class="form-select" id="event-case"></select></div>
                    <div class="mb-3"><label class="form-label">כותרת</label><input type="text" class="form-control" id="event-title" required></div>
                    <div class="mb-3"><label class="form-label">תיאור</label><textarea class="form-control" id="event-desc" rows="2"></textarea></div>
                    <div class="row mb-3">
                        <div class="col-md-6"><label class="form-label">תאריך</label><input type="datetime-local" class="form-control" id="event-date" required></div>
                        <div class="col-md-6"><label class="form-label">תאריך סיום</label><input type="datetime-local" class="form-control" id="event-end-date"></div>
                    </div>
                    <div class="mb-3"><label class="form-label">מיקום</label><input type="text" class="form-control" id="event-location"></div>
                    <div class="mb-3"><label class="form-label">תגיות (מופרדות בפסיק)</label><input type="text" class="form-control" id="event-tags" placeholder="חקירה, פגישה, מסמך"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button class="btn btn-primary" id="save-event-btn"><i class="fas fa-save me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generate Modal -->
    <div class="modal fade" id="generateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">הפקת ציר זמן אוטומטית</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">תיק</label><select class="form-select" id="gen-case"></select></div>
                    <div class="mb-3">
                        <label class="form-label">ספק AI</label>
                        <select class="form-select" id="gen-provider">
                            <option value="deepseek">DeepSeek</option>
                            <option value="gemini">Gemini</option>
                        </select>
                    </div>
                    <p class="text-muted small">המערכת תנתח את כל החומרים בתיק ותחלץ אירועים עם תאריכים.</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button class="btn btn-primary" id="run-generate-btn"><i class="fas fa-robot me-1"></i>הפק</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/timeline.js"></script>
</body>
</html>
