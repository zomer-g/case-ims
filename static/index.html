<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-IMS: ניהול חומרי חקירה</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #2c5364; --brand-light: #203a43; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .skip-link {
            position: absolute; top: -100px; left: 0;
            background: #000; color: #fff; padding: 10px 20px;
            z-index: 10000; text-decoration: none;
        }
        .skip-link:focus { top: 0; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        :focus-visible { outline: 3px solid #f59e0b !important; outline-offset: 2px !important; }
        .navbar { background: var(--brand) !important; }

        /* Case selector */
        .case-card {
            border-radius: 0.75rem; transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; border: 2px solid transparent;
        }
        .case-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .case-card.active { border-color: var(--brand); }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white; padding: 2.5rem 0 2rem;
        }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed #adb5bd; border-radius: 0.75rem;
            padding: 1rem 1.5rem; text-align: center; cursor: pointer;
            transition: all 0.3s; background: white;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--brand); background: #e8f4f8;
        }
        .upload-zone i.upload-icon { font-size: 1.3rem; color: #495057; }

        /* Material cards */
        .mat-card {
            border: none; border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .mat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

        .tag-badge {
            background: #e8f4f8; color: var(--brand);
            border: 1px solid #b8d8e8; font-size: 0.75rem;
        }
        .type-icon { font-size: 1.8rem; color: var(--brand); }
        .status-badge { font-size: 0.7rem; }

        /* Queue status bar */
        .queue-bar {
            background: rgba(0,0,0,0.15); border-radius: 0.5rem;
            padding: 0.3rem 0.8rem; font-size: 0.8rem;
        }

        /* Modal content text */
        .content-text-preview {
            max-height: 400px; overflow-y: auto;
            background: #f8f9fa; padding: 1rem; border-radius: 0.5rem;
            font-size: 0.85rem; white-space: pre-wrap; direction: rtl;
        }
    </style>
</head>
<body>
    <a class="skip-link" href="#main-content">דלג לתוכן הראשי</a>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" role="navigation" aria-label="Main navigation">
        <div class="container-fluid">
            <a class="navbar-brand" href="/static/index.html">
                <i class="fas fa-folder-open me-2"></i>Case-IMS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/static/index.html"><i class="fas fa-file-alt me-1"></i>חומרים</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/static/admin.html"><i class="fas fa-cog me-1"></i>ניהול</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-user-info">
                        <span class="nav-link text-light" id="user-email"></span>
                    </li>
                    <li class="nav-item" id="nav-login">
                        <a class="nav-link" href="/static/login.html"><i class="fas fa-sign-in-alt me-1"></i>כניסה</a>
                    </li>
                    <li class="nav-item d-none" id="nav-logout">
                        <a class="nav-link" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>יציאה</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero + Upload -->
    <section class="hero" id="hero-section">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0"><i class="fas fa-file-alt me-2"></i>חומרי חקירה</h2>
                <div class="queue-bar d-none" id="queue-status-bar">
                    <i class="fas fa-cogs me-1"></i>
                    <span id="queue-running">0</span> בעיבוד |
                    <span id="queue-pending">0</span> בהמתנה
                </div>
            </div>

            <!-- Case selector -->
            <div class="mb-3">
                <select class="form-select form-select-sm" id="case-select" style="max-width:300px; display:inline-block;">
                    <option value="">כל התיקים</option>
                </select>
                <button class="btn btn-sm btn-outline-light ms-2" id="new-case-btn" title="תיק חדש">
                    <i class="fas fa-plus me-1"></i>תיק חדש
                </button>
            </div>

            <!-- Upload -->
            <div class="upload-zone d-none" id="upload-zone" role="button" tabindex="0" aria-label="גרור קבצים או לחץ להעלאה">
                <i class="fas fa-cloud-upload-alt upload-icon me-2"></i>
                <span>גרור קבצים לכאן או לחץ להעלאה</span>
                <input type="file" id="file-input" class="d-none" multiple accept=".pdf,.doc,.docx,.txt,.html,.png,.jpg,.jpeg,.mp3,.wav,.m4a,.mp4,.avi,.mov,.csv,.xlsx,.pptx">
            </div>
            <div id="upload-progress" class="mt-2"></div>

            <!-- Filters -->
            <div class="d-flex gap-2 mt-3 flex-wrap align-items-center">
                <input type="text" class="form-control form-control-sm" id="search-input" placeholder="חיפוש לפי שם קובץ..." style="max-width:250px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <select class="form-select form-select-sm" id="type-filter" style="max-width:150px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                    <option value="">כל הסוגים</option>
                    <option value="pdf">PDF</option>
                    <option value="image">תמונה</option>
                    <option value="audio">אודיו</option>
                    <option value="video">וידאו</option>
                    <option value="table">טבלה</option>
                    <option value="other">אחר</option>
                </select>
                <span class="text-light small" id="total-count"></span>
            </div>
        </div>
    </section>

    <!-- Main content -->
    <main id="main-content" class="container py-4">
        <div id="materials-list" class="row g-3">
            <!-- Material cards rendered here -->
        </div>
        <div id="loading-spinner" class="text-center py-5 d-none">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">טוען...</span>
            </div>
        </div>
        <div id="empty-state" class="text-center py-5 d-none">
            <i class="fas fa-inbox fa-3x text-muted mb-3 d-block"></i>
            <p class="text-muted">לא נמצאו חומרים. העלה קבצים להתחלה.</p>
        </div>
        <!-- Pagination -->
        <nav id="pagination-nav" class="d-none mt-4" aria-label="ניווט בין דפים">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </main>

    <!-- Material detail modal -->
    <div class="modal fade" id="materialModal" tabindex="-1" aria-labelledby="materialModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="materialModalLabel">פרטי חומר</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="סגור"></button>
                </div>
                <div class="modal-body" id="material-detail-body">
                    <!-- Filled by JS -->
                </div>
                <div class="modal-footer">
                    <a href="#" id="modal-download-btn" class="btn btn-primary"><i class="fas fa-download me-1"></i>הורדה</a>
                    <button type="button" class="btn btn-outline-secondary" id="modal-reprocess-btn"><i class="fas fa-redo me-1"></i>עיבוד מחדש</button>
                    <button type="button" class="btn btn-outline-danger" id="modal-delete-btn"><i class="fas fa-trash me-1"></i>מחיקה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- New case modal -->
    <div class="modal fade" id="newCaseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">תיק חדש</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="case-name" class="form-label">שם התיק</label>
                        <input type="text" class="form-control" id="case-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="case-desc" class="form-label">תיאור</label>
                        <textarea class="form-control" id="case-desc" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button type="button" class="btn btn-primary" id="create-case-btn">יצירה</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/ims-core.js"></script>
</body>
</html>
