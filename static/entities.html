<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-IMS: ישויות</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #2c5364; --brand-light: #203a43; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: var(--brand) !important; }
        .hero { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 2rem 0 1.5rem; }
        .entity-card { border: none; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .entity-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .entity-type-badge { font-size: 0.75rem; border-radius: 1rem; padding: 0.2rem 0.6rem; color: white; }
        .link-tag { font-size: 0.8rem; background: #e8f4f8; color: var(--brand); border: 1px solid #b8d8e8; border-radius: 1rem; padding: 0.15rem 0.5rem; display: inline-flex; align-items: center; gap: 0.3rem; }
        .link-tag .remove-link { cursor: pointer; color: #dc3545; font-size: 0.7rem; }
        .link-section { background: #f8f9fa; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/static/index.html"><i class="fas fa-folder-open me-2"></i>Case-IMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html"><i class="fas fa-file-alt me-1"></i>חומרים</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/entities.html"><i class="fas fa-project-diagram me-1"></i>ישויות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/groups.html"><i class="fas fa-layer-group me-1"></i>קבוצות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/timeline.html"><i class="fas fa-stream me-1"></i>ציר זמן</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/static/admin.html"><i class="fas fa-cog me-1"></i>ניהול</a></li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item d-flex align-items-center me-3">
                        <i class="fas fa-briefcase text-light me-1"></i>
                        <select id="global-case-select" class="form-select form-select-sm" style="max-width:200px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);"></select>
                    </li>
                    <li class="nav-item" id="nav-user-info"><span class="nav-link text-light" id="user-email"></span></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="/static/login.html"><i class="fas fa-sign-in-alt me-1"></i>כניסה</a></li>
                    <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>יציאה</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0"><i class="fas fa-project-diagram me-2"></i>ישויות</h2>
                <button class="btn btn-sm btn-outline-light" id="new-entity-btn"><i class="fas fa-plus me-1"></i>ישות חדשה</button>
            </div>
            <!-- Filters -->
            <div class="d-flex gap-2 flex-wrap align-items-center">
                <select class="form-select form-select-sm" id="type-filter" style="max-width:150px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                    <option value="">כל הסוגים</option>
                    <option value="person">אדם</option>
                    <option value="event">אירוע</option>
                    <option value="corporation">תאגיד</option>
                    <option value="topic">נושא</option>
                </select>
                <input type="text" class="form-control form-control-sm" id="search-input" placeholder="חיפוש..." style="max-width:200px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <span class="text-light small" id="total-count"></span>
            </div>
        </div>
    </section>

    <!-- Main -->
    <main class="container py-4">
        <div id="entities-list" class="row g-3"></div>
        <div id="loading-spinner" class="text-center py-5 d-none"><div class="spinner-border text-secondary"></div></div>
        <div id="empty-state" class="text-center py-5 d-none">
            <i class="fas fa-project-diagram fa-3x text-muted mb-3 d-block"></i>
            <p class="text-muted">לא נמצאו ישויות. צור ישות חדשה להתחלה.</p>
        </div>
        <nav id="pagination-nav" class="d-none mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </main>

    <!-- Create/Edit Entity Modal -->
    <div class="modal fade" id="entityModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="entityModalLabel">ישות חדשה</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="entity-id">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">סוג</label>
                            <select class="form-select" id="entity-type">
                                <option value="person">אדם</option>
                                <option value="event">אירוע</option>
                                <option value="corporation">תאגיד</option>
                                <option value="topic">נושא</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">תיק</label>
                            <select class="form-select" id="entity-case"></select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">שם</label>
                        <input type="text" class="form-control" id="entity-name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">תיאור</label>
                        <textarea class="form-control" id="entity-desc" rows="2"></textarea>
                    </div>
                    <!-- Type-specific fields -->
                    <div id="fields-person" class="type-fields d-none">
                        <div class="row mb-3">
                            <div class="col-md-6"><label class="form-label">תפקיד</label><input type="text" class="form-control" id="person-role"></div>
                            <div class="col-md-6"><label class="form-label">מספר זיהוי</label><input type="text" class="form-control" id="person-id"></div>
                        </div>
                    </div>
                    <div id="fields-event" class="type-fields d-none">
                        <div class="row mb-3">
                            <div class="col-md-4"><label class="form-label">תאריך</label><input type="datetime-local" class="form-control" id="event-date"></div>
                            <div class="col-md-4"><label class="form-label">תאריך סיום</label><input type="datetime-local" class="form-control" id="event-end-date"></div>
                            <div class="col-md-4"><label class="form-label">מיקום</label><input type="text" class="form-control" id="event-location"></div>
                        </div>
                    </div>
                    <div id="fields-corporation" class="type-fields d-none">
                        <div class="row mb-3">
                            <div class="col-md-6"><label class="form-label">סוג תאגיד</label><input type="text" class="form-control" id="corp-type"></div>
                            <div class="col-md-6"><label class="form-label">מספר רישום</label><input type="text" class="form-control" id="corp-reg"></div>
                        </div>
                    </div>
                    <div id="fields-topic" class="type-fields d-none">
                        <div class="row mb-3">
                            <div class="col-md-6"><label class="form-label">צבע</label><input type="color" class="form-control form-control-color" id="topic-color" value="#6f42c1"></div>
                            <div class="col-md-6"><label class="form-label">אייקון</label><input type="text" class="form-control" id="topic-icon" placeholder="fas fa-tag"></div>
                        </div>
                    </div>
                    <!-- Dynamic JSON metadata -->
                    <div class="mb-3">
                        <label class="form-label">מטא-דאטה (JSON)</label>
                        <textarea class="form-control font-monospace" id="entity-metadata" rows="3" placeholder='{"key": "value"}'></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button type="button" class="btn btn-primary" id="save-entity-btn"><i class="fas fa-save me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Entity Detail Modal -->
    <div class="modal fade" id="entityDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="entityDetailLabel">פרטי ישות</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="entity-detail-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-outline-primary" id="detail-edit-btn"><i class="fas fa-edit me-1"></i>עריכה</button>
                    <button class="btn btn-outline-danger" id="detail-delete-btn"><i class="fas fa-trash me-1"></i>מחיקה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Link Entity Modal -->
    <div class="modal fade" id="linkModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="linkModalLabel">קישור</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="link-source-entity-id">
                    <div class="mb-3" id="link-type-section">
                        <label class="form-label">סוג קישור</label>
                        <select class="form-select" id="link-type">
                            <option value="entity">ישות</option>
                            <option value="material">חומר</option>
                            <option value="folder">תיקייה</option>
                        </select>
                    </div>
                    <div id="link-entity-fields">
                        <div class="mb-3">
                            <label class="form-label">בחר ישות</label>
                            <select class="form-select" id="link-target-entity"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">סוג קשר</label>
                            <input type="text" class="form-control" id="link-relationship" placeholder="שותף, עד, חבר...">
                        </div>
                    </div>
                    <div id="link-material-fields" class="d-none">
                        <div class="mb-3">
                            <label class="form-label">בחר חומר</label>
                            <select class="form-select" id="link-target-material"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">רלוונטיות</label>
                            <input type="text" class="form-control" id="link-relevance" placeholder="ראשי, משני...">
                        </div>
                    </div>
                    <div id="link-folder-fields" class="d-none">
                        <div class="mb-3">
                            <label class="form-label">בחר תיקייה</label>
                            <select class="form-select" id="link-target-folder"></select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button class="btn btn-primary" id="save-link-btn"><i class="fas fa-link me-1"></i>קשר</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/entities.js"></script>
</body>
</html>
