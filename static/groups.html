<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-DMS: קבוצות חומרים</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #2c5364; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: var(--brand) !important; }
        .hero { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 2rem 0 1.5rem; }
        .group-card { border: none; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; cursor: pointer; }
        .group-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .analysis-result { background: #f8f9fa; border-radius: 0.5rem; padding: 1rem; white-space: pre-wrap; direction: rtl; max-height: 400px; overflow-y: auto; font-size: 0.9rem; }
        .member-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/static/index.html"><i class="fas fa-folder-open me-2"></i>Case-DMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/index.html"><i class="fas fa-file-alt me-1"></i>חומרים</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/entities.html"><i class="fas fa-project-diagram me-1"></i>ישויות</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/static/groups.html"><i class="fas fa-layer-group me-1"></i>קבוצות</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/timeline.html"><i class="fas fa-stream me-1"></i>ציר זמן</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/static/admin.html"><i class="fas fa-cog me-1"></i>ניהול</a></li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item d-flex align-items-center me-3">
                        <i class="fas fa-briefcase text-light me-1"></i>
                        <select id="global-case-select" class="form-select form-select-sm" style="max-width:200px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);"></select>
                    </li>
                    <li class="nav-item" id="nav-user-info"><span class="nav-link text-light" id="user-email"></span></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="/static/login.html"><i class="fas fa-sign-in-alt me-1"></i>כניסה</a></li>
                    <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>יציאה</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0"><i class="fas fa-layer-group me-2"></i>קבוצות חומרים</h2>
                <button class="btn btn-sm btn-outline-light" id="new-group-btn"><i class="fas fa-plus me-1"></i>קבוצה חדשה</button>
            </div>
        </div>
    </section>

    <main class="container py-4">
        <div id="groups-list" class="row g-3"></div>
        <div id="loading-spinner" class="text-center py-5 d-none"><div class="spinner-border text-secondary"></div></div>
        <div id="empty-state" class="text-center py-5 d-none">
            <i class="fas fa-layer-group fa-3x text-muted mb-3 d-block"></i>
            <p class="text-muted">אין קבוצות חומרים. צור קבוצה חדשה.</p>
        </div>
    </main>

    <!-- Create Group Modal -->
    <div class="modal fade" id="createGroupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">קבוצה חדשה</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">תיק</label><select class="form-select" id="group-case"></select></div>
                    <div class="mb-3"><label class="form-label">שם הקבוצה</label><input type="text" class="form-control" id="group-name" required></div>
                    <div class="mb-3"><label class="form-label">תיאור</label><textarea class="form-control" id="group-desc" rows="2"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button class="btn btn-primary" id="create-group-btn">יצירה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Group Detail Modal -->
    <div class="modal fade" id="groupDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="groupDetailLabel">פרטי קבוצה</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="group-detail-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-outline-info" id="analyze-group-btn"><i class="fas fa-robot me-1"></i>ניתוח AI</button>
                    <button class="btn btn-outline-danger" id="delete-group-btn"><i class="fas fa-trash me-1"></i>מחיקה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Members Modal -->
    <div class="modal fade" id="addMembersModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">הוספת חומרים לקבוצה</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="add-members-group-id">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="member-search" placeholder="חיפוש חומרים...">
                    </div>
                    <div id="available-materials" style="max-height:400px; overflow-y:auto;"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>
                    <button class="btn btn-primary" id="confirm-add-members"><i class="fas fa-plus me-1"></i>הוסף נבחרים</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/groups.js"></script>
</body>
</html>
