services:
  - type: web
    name: case-dms
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: "sqlite:////data/dms.db"
      - key: UPLOAD_DIR
        value: "/data/uploads"
      - key: RUNTIME_MODE
        value: "cloud"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
    disk:
      name: case-dms-data
      mountPath: /data
      sizeGB: 1
